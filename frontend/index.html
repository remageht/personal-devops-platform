<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal DevOps Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<div class="max-w-6xl mx-auto p-6">
    <div class="flex items-center justify-between mb-10">
        <div class="flex items-center gap-4">
            <i class="fas fa-server text-5xl text-emerald-500"></i>
            <div>
                <h1 class="text-4xl font-bold tracking-tight">Personal DevOps Platform</h1>
                <p class="text-zinc-400">v0.2 • Твоя домашняя лаборатория</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span id="uptime" class="text-sm bg-zinc-900 px-4 py-2 rounded-full"></span>
            <button onclick="location.reload()" 
                    class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-xl transition">
                <i class="fas fa-sync"></i> Обновить
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Статус -->
        <div class="bg-zinc-900 rounded-3xl p-8 card">
            <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                <i class="fas fa-heartbeat text-emerald-400"></i>
                Статус системы
            </h2>
            <div id="status" class="space-y-4 text-lg"></div>
        </div>

        <!-- Контейнеры -->
        <div class="bg-zinc-900 rounded-3xl p-8 card">
            <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                <i class="fab fa-docker text-blue-400"></i>
                Запущенные контейнеры
            </h2>
            <div id="containers-list" class="space-y-3"></div>
        </div>
    </div>

    <div class="mt-10 text-center text-zinc-500 text-sm">
        Grafana: <a href="http://localhost:3000" target="_blank" class="text-violet-400 hover:underline">открыть</a> • 
        Prometheus: <a href="http://localhost:9090" target="_blank" class="text-violet-400 hover:underline">открыть</a>
    </div>
</div>

<script>
    async function refresh() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();

            // Uptime
            document.getElementById('uptime').innerHTML = `🕒 ${data.uptime_seconds} сек`;

            // Статус
            let statusHTML = `
                <div class="flex justify-between items-center bg-zinc-800 p-4 rounded-2xl">
                    <span>Общий статус</span>
                    <span class="text-emerald-400 font-medium">● Здоров</span>
                </div>
            `;
            document.getElementById('status').innerHTML = statusHTML;

            // Контейнеры
            let containersHTML = '';
            if (data.containers.length === 0) {
                containersHTML = '<p class="text-zinc-500">Нет запущенных контейнеров</p>';
            } else {
                data.containers.forEach(c => {
                    const color = c.status.includes('running') ? 'emerald' : 'red';
                    containersHTML += `
                        <div class="flex justify-between items-center bg-zinc-800 p-4 rounded-2xl">
                            <span class="font-medium">${c.name}</span>
                            <span class="px-3 py-1 text-xs font-medium bg-${color}-900 text-${color}-300 rounded-full">
                                ${c.status}
                            </span>
                        </div>`;
                });
            }
            document.getElementById('containers-list').innerHTML = containersHTML;

        } catch (err) {
            console.error("Ошибка загрузки данных:", err);
        }
    }

    // Обновление каждые 3 секунды
    setInterval(refresh, 3000);
    window.onload = refresh;
</script>
</body>
</html>
