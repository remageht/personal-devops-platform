<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal DevOps Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<div class="max-w-6xl mx-auto p-8">
    <div class="flex items-center gap-4 mb-10">
        <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-3xl">📦</div>
        <div>
            <h1 class="text-4xl font-bold">Personal DevOps Platform</h1>
            <p class="text-zinc-400">v0.2 • Домашняя DevOps лаборатория</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <!-- Статус приложения -->
        <div class="bg-zinc-900 rounded-3xl p-8">
            <div class="flex items-center gap-3 mb-6">
                <i class="fas fa-chart-bar text-emerald-400 text-2xl"></i>
                <h2 class="text-2xl font-semibold">Статус приложения</h2>
            </div>
            <div id="status" class="space-y-4"></div>
        </div>

        <!-- Контейнеры -->
        <div class="bg-zinc-900 rounded-3xl p-8">
            <div class="flex items-center gap-3 mb-6">
                <i class="fab fa-docker text-blue-400 text-2xl"></i>
                <h2 class="text-2xl font-semibold">Запущенные контейнеры</h2>
            </div>
            <div id="containers-list" class="space-y-3 min-h-[200px]"></div>
        </div>
    </div>

    <div class="mt-12 text-center text-zinc-500">
        Grafana → <a href="http://localhost:3000" target="_blank" class="text-violet-400 hover:underline">открыть</a> | 
        Prometheus → <a href="http://localhost:9090" target="_blank" class="text-violet-400 hover:underline">открыть</a>
    </div>
</div>

<script>
    async function refreshDashboard() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();

            // Статус
            document.getElementById('status').innerHTML = `
                <div class="flex justify-between bg-zinc-800 p-5 rounded-2xl">
                    <span class="text-zinc-400">Статус</span>
                    <span class="text-emerald-400 font-medium flex items-center gap-2">
                        <span class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></span>
                        ${data.status}
                    </span>
                </div>
                <div class="flex justify-between bg-zinc-800 p-5 rounded-2xl">
                    <span class="text-zinc-400">Uptime</span>
                    <span class="font-mono">${data.uptime_seconds} сек</span>
                </div>
            `;

            // Контейнеры
            let html = '';
            if (data.containers && data.containers.length > 0) {
                data.containers.forEach(c => {
                    const isRunning = c.status.toLowerCase().includes('running') || c.status.toLowerCase().includes('up');
                    const color = isRunning ? 'emerald' : 'orange';
                    html += `
                        <div class="flex justify-between items-center bg-zinc-800 hover:bg-zinc-700 p-5 rounded-2xl transition">
                            <div class="flex items-center gap-3">
                                <i class="fab fa-docker text-blue-400"></i>
                                <span class="font-medium">${c.name}</span>
                            </div>
                            <span class="px-4 py-1 text-xs font-medium bg-${color}-900/80 text-${color}-300 rounded-full">
                                ${c.status}
                            </span>
                        </div>`;
                });
            } else {
                html = `<p class="text-zinc-500 text-center py-8">Нет запущенных контейнеров</p>`;
            }
            document.getElementById('containers-list').innerHTML = html;

        } catch (e) {
            console.error(e);
            document.getElementById('containers-list').innerHTML = `
                <p class="text-red-400 text-center py-8">Ошибка подключения к API</p>`;
        }
    }

    setInterval(refreshDashboard, 4000);
    window.onload = refreshDashboard;
</script>
</body>
</html>
