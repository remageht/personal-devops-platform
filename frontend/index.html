<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal DevOps Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<div class="max-w-6xl mx-auto p-8">
    <div class="flex items-center gap-4 mb-10">
        <div class="w-14 h-14 bg-emerald-600 rounded-2xl flex items-center justify-center text-4xl">📦</div>
        <div>
            <h1 class="text-4xl font-bold">Personal DevOps Platform</h1>
            <p class="text-zinc-400">v0.4 • Быстрые инструменты</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Статус -->
        <div class="bg-zinc-900 rounded-3xl p-8">
            <div class="flex items-center gap-3 mb-6">
                <i class="fas fa-heartbeat text-emerald-400 text-2xl"></i>
                <h2 class="text-2xl font-semibold">Статус приложения</h2>
            </div>
            <div id="status" class="space-y-4"></div>
        </div>

        <!-- Контейнеры -->
        <div class="bg-zinc-900 rounded-3xl p-8 lg:col-span-2">
            <div class="flex items-center gap-3 mb-6">
                <i class="fab fa-docker text-blue-400 text-2xl"></i>
                <h2 class="text-2xl font-semibold">Контейнеры</h2>
            </div>
            <div id="containers-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- Быстрые инструменты -->
        <div class="bg-zinc-900 rounded-3xl p-8 lg:col-span-3">
            <div class="flex items-center gap-3 mb-6">
                <i class="fas fa-tools text-amber-400 text-2xl"></i>
                <h2 class="text-2xl font-semibold">Быстрые инструменты</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="tools-list"></div>
        </div>
    </div>
</div>

<!-- Модальное окно результата скрипта -->
<div id="result-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-3xl mx-4 max-h-[85vh] flex flex-col">
        <div class="p-6 border-b border-zinc-700 flex justify-between items-center">
            <h3 class="text-xl font-semibold" id="modal-title">Результат выполнения</h3>
            <button onclick="closeModal()" class="text-3xl text-zinc-400 hover:text-white">✕</button>
        </div>
        <pre id="result-content" class="p-6 overflow-auto font-mono text-sm bg-black/60 flex-1 text-emerald-200 whitespace-pre-wrap"></pre>
    </div>
</div>

<script>
    const tools = [
        {name: "system-info.sh",    label: "📋 Информация о системе",     icon: "📋"},
        {name: "clean-docker.sh",   label: "🧹 Очистить Docker",         icon: "🧹"},
        {name: "update-system.sh",  label: "🔄 Обновить Ubuntu",         icon: "🔄"}
    ];

    async function refreshDashboard() {
        // ... (оставляем код обновления статуса и контейнеров как раньше)
        try {
            const res = await fetch('/api/status');
            const data = await res.json();

            // Статус (упрощённо)
            document.getElementById('status').innerHTML = `
                <div class="bg-zinc-800 p-5 rounded-2xl flex justify-between">
                    <span>Статус</span>
                    <span class="text-emerald-400">● healthy</span>
                </div>
                <div class="bg-zinc-800 p-5 rounded-2xl flex justify-between">
                    <span>Uptime</span>
                    <span class="font-mono">${data.uptime_seconds} сек</span>
                </div>
            `;

            // Контейнеры (можно оставить как было раньше)
            let contHTML = '';
            data.containers.forEach(c => {
                contHTML += `<div class="bg-zinc-800 p-4 rounded-2xl text-sm">${c.name} — ${c.status}</div>`;
            });
            document.getElementById('containers-list').innerHTML = contHTML || '<p class="text-zinc-500">Нет данных</p>';
        } catch(e) {}
    }

    async function runTool(scriptName) {
        if (!confirm(`Запустить скрипт "${scriptName}"?`)) return;

        try {
            const res = await fetch('/api/run-script', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({script_name: scriptName})
            });

            const data = await res.json();
            document.getElementById('modal-title').textContent = `Результат: ${scriptName}`;
            document.getElementById('result-content').textContent = data.output || "Скрипт выполнен успешно (без вывода)";
            document.getElementById('result-modal').classList.remove('hidden');
        } catch (err) {
            alert("Ошибка при запуске скрипта");
        }
    }

    function closeModal() {
        document.getElementById('result-modal').classList.add('hidden');
    }

    // Инициализация кнопок инструментов
    function initTools() {
        let html = '';
        tools.forEach(tool => {
            html += `
                <button onclick="runTool('${tool.name}')" 
                        class="group bg-zinc-800 hover:bg-zinc-700 p-6 rounded-3xl text-left transition-all hover:scale-[1.02]">
                    <div class="text-4xl mb-4">${tool.icon}</div>
                    <div class="font-medium text-lg">${tool.label}</div>
                </button>`;
        });
        document.getElementById('tools-list').innerHTML = html;
    }

    window.onload = () => {
        refreshDashboard();
        initTools();
    };
    setInterval(refreshDashboard, 5000);
</script>
</body>
</html>
