<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal DevOps Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<div class="max-w-6xl mx-auto p-8">
    <div class="flex items-center gap-4 mb-10">
        <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-3xl">📦</div>
        <div>
            <h1 class="text-4xl font-bold">Personal DevOps Platform</h1>
            <p class="text-zinc-400">v0.3 • Управление инфраструктурой</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Статус -->
        <div class="bg-zinc-900 rounded-3xl p-8">
            <div class="flex items-center gap-3 mb-6">
                <i class="fas fa-heartbeat text-emerald-400 text-2xl"></i>
                <h2 class="text-2xl font-semibold">Статус приложения</h2>
            </div>
            <div id="status" class="space-y-4"></div>
        </div>

        <!-- Контейнеры -->
        <div class="bg-zinc-900 rounded-3xl p-8">
            <div class="flex items-center gap-3 mb-6">
                <i class="fab fa-docker text-blue-400 text-2xl"></i>
                <h2 class="text-2xl font-semibold">Запущенные контейнеры</h2>
            </div>
            <div id="containers-list" class="space-y-3"></div>
        </div>
    </div>

    <div class="mt-12 text-center text-zinc-500 text-sm">
        Grafana → <a href="http://localhost:3000" target="_blank" class="text-violet-400 hover:underline">открыть</a> | 
        Prometheus → <a href="http://localhost:9090" target="_blank" class="text-violet-400 hover:underline">открыть</a>
    </div>
</div>

<script>
    async function refreshDashboard() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();

            // Статус
            document.getElementById('status').innerHTML = `
                <div class="flex justify-between bg-zinc-800 p-5 rounded-2xl">
                    <span class="text-zinc-400">Статус</span>
                    <span class="text-emerald-400 font-medium flex items-center gap-2">
                        ● ${data.status}
                    </span>
                </div>
                <div class="flex justify-between bg-zinc-800 p-5 rounded-2xl">
                    <span class="text-zinc-400">Uptime</span>
                    <span class="font-mono">${data.uptime_seconds} сек</span>
                </div>
            `;

            // Контейнеры
            let html = '';
            data.containers.forEach(c => {
                const isRunning = c.status.toLowerCase().includes('up') || c.status.toLowerCase().includes('running');
                const color = isRunning ? 'emerald' : 'orange';
                
                html += `
                    <div class="bg-zinc-800 p-6 rounded-2xl flex flex-col gap-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="font-semibold text-lg">${c.name}</div>
                                <div class="text-xs text-zinc-500">${c.image}</div>
                            </div>
                            <span class="px-4 py-1 text-xs font-medium bg-${color}-900 text-${color}-300 rounded-full">
                                ${c.status}
                            </span>
                        </div>
                        
                        <div class="flex gap-3">
                            <button onclick="performAction('${c.name}', 'restart')" 
                                    class="flex-1 bg-amber-600 hover:bg-amber-700 py-3 rounded-xl text-sm font-medium transition">
                                ♻ Перезапустить
                            </button>
                            ${isRunning ? `
                            <button onclick="performAction('${c.name}', 'stop')" 
                                    class="flex-1 bg-red-600 hover:bg-red-700 py-3 rounded-xl text-sm font-medium transition">
                                ⏹ Остановить
                            </button>` : `
                            <button onclick="performAction('${c.name}', 'start')" 
                                    class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl text-sm font-medium transition">
                                ▶ Запустить
                            </button>`}
                        </div>
                    </div>`;
            });

            document.getElementById('containers-list').innerHTML = html || '<p class="text-zinc-500 py-8 text-center">Нет контейнеров</p>';

        } catch (e) {
            console.error(e);
        }
    }

    async function performAction(name, action) {
        if (!confirm(`Вы действительно хотите ${action === 'restart' ? 'перезапустить' : action === 'stop' ? 'остановить' : 'запустить'} контейнер ${name}?`)) {
            return;
        }

        try {
            const res = await fetch(`/api/container/${name}/action`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: action })
            });
            
            const result = await res.json();
            alert(result.message || 'Действие выполнено');
            refreshDashboard();  // обновляем список
        } catch (err) {
            alert('Ошибка при выполнении действия');
        }
    }

    setInterval(refreshDashboard, 5000);
    window.onload = refreshDashboard;
</script>
</body>
</html>
