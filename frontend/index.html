<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal DevOps Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <i class="fas fa-server text-4xl text-emerald-500"></i>
                <div>
                    <h1 class="text-3xl font-bold">Personal DevOps Platform</h1>
                    <p class="text-gray-400">v0.1 • Твоя домашняя DevOps-лаборатория</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="status" class="flex items-center gap-2 px-4 py-2 bg-emerald-900/50 text-emerald-400 rounded-full text-sm font-medium">
                    <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
                    ONLINE
                </div>
                <button onclick="refreshAll()" 
                        class="flex items-center gap-2 px-5 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors">
                    <i class="fas fa-sync-alt"></i>
                    <span>Обновить</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Card 1: Основная информация -->
            <div class="bg-gray-900 rounded-2xl p-6 card">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                    <i class="fas fa-info-circle text-blue-400"></i>
                    Статус приложения
                </h2>
                <div id="app-info" class="space-y-3">
                    <!-- Заполняется через JS -->
                </div>
            </div>

            <!-- Card 2: Контейнеры -->
            <div class="bg-gray-900 rounded-2xl p-6 card">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                    <i class="fas fa-docker text-blue-500"></i>
                    Запущенные контейнеры
                </h2>
                <div id="containers-info" class="text-gray-300">
                    Загрузка...
                </div>
            </div>

            <!-- Card 3: Мониторинг -->
            <div class="bg-gray-900 rounded-2xl p-6 card">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                    <i class="fas fa-chart-line text-purple-400"></i>
                    Быстрый мониторинг
                </h2>
                <div class="text-sm text-gray-400">
                    <p>Grafana: <a href="http://localhost:3000" target="_blank" class="text-purple-400 hover:underline">открыть →</a></p>
                    <p>Prometheus: <a href="http://localhost:9090" target="_blank" class="text-purple-400 hover:underline">открыть →</a></p>
                </div>
            </div>
        </div>

        <!-- Действия -->
        <div class="mt-10">
            <h2 class="text-xl font-semibold mb-4">Быстрые действия</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="alert('Пока заглушка: Перезапуск всех сервисов')" 
                        class="bg-red-600 hover:bg-red-700 py-4 rounded-xl font-medium transition-colors">
                    ♻ Перезапустить все
                </button>
                <button onclick="alert('Пока заглушка: Запуск CI/CD')" 
                        class="bg-amber-600 hover:bg-amber-700 py-4 rounded-xl font-medium transition-colors">
                    ▶ Запустить Pipeline
                </button>
                <button onclick="alert('Пока заглушка: Сканирование уязвимостей')" 
                        class="bg-cyan-600 hover:bg-cyan-700 py-4 rounded-xl font-medium transition-colors">
                    🔍 Сканировать образы
                </button>
                <button onclick="window.open('http://localhost:3000', '_blank')" 
                        class="bg-purple-600 hover:bg-purple-700 py-4 rounded-xl font-medium transition-colors">
                    📊 Открыть Grafana
                </button>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const res = await fetch('http://localhost:8000/');
                const data = await res.json();

                // Заполняем информацию о приложении
                document.getElementById('app-info').innerHTML = `
                    <div class="flex justify-between">
                        <span class="text-gray-400">Статус</span>
                        <span class="text-emerald-400 font-medium">${data.status}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">Uptime</span>
                        <span class="font-medium">${data.uptime_seconds} сек</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">Сообщение</span>
                        <span class="font-medium">${data.message}</span>
                    </div>
                `;

            } catch (err) {
                document.getElementById('app-info').innerHTML = `
                    <p class="text-red-400">Ошибка подключения к API</p>
                `;
            }
        }

        async function fetchContainers() {
            try {
                const res = await fetch('http://localhost:8000/containers');
                const data = await res.json();
                document.getElementById('containers-info').innerHTML = `
                    <p class="text-emerald-400">${data.containers}</p>
                `;
            } catch (err) {
                document.getElementById('containers-info').innerHTML = `
                    <p class="text-red-400">Не удалось получить данные о контейнерах</p>
                `;
            }
        }

        function refreshAll() {
            fetchData();
            fetchContainers();
        }

        // Автообновление каждые 5 секунд
        setInterval(refreshAll, 5000);

        // Первая загрузка
        window.onload = () => {
            refreshAll();
        };
    </script>
</body>
</html>
